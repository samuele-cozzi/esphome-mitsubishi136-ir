# Example ESPHome configuration for Mitsubishi 136 IR Climate Component

esphome:
  name: ac-controller
  friendly_name: AC Controller

esp32:
  board: esp32dev

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

# Enable OTA
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Load the external component
external_components:
  - source: github://samuele-cozzi/esphome-mitsubishi136-ir
    components: [mitsubishi136_ir]

# Climate configuration
climate:
  - platform: mitsubishi136_ir
    id: living_room_ac
    name: "Living Room AC"
    ir_pin: 4  # GPIO pin connected to IR LED (default: 4)
